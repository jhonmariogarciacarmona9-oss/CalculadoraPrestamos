<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Iniciar Sesión — SOMOS TRES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#2563eb"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-title" content="Préstamos"/>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.28);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem 2.2rem;
        }
        .login-header {
            background: linear-gradient(135deg, #1e3a5f, #2563eb);
            color: #fff;
            border-radius: 12px;
            padding: 1.4rem 1rem;
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(37,99,235,.2); border-color: #2563eb; }
        .btn-login { background: #2563eb; border: none; font-weight: 600; letter-spacing: .4px; }
        .btn-login:hover { background: #1d4ed8; }
        .btn-install { background: #059669; border: none; font-weight: 600; letter-spacing: .4px; }
        .btn-install:hover { background: #047857; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-bank2 fs-2 d-block mb-1"></i>
            <h4 class="mb-0 fw-bold">SOMOS TRES</h4>
            <small class="opacity-75">Ingrese sus credenciales</small>
        </div>

        <!-- Mensajes -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            Sesión cerrada correctamente.
        </div>

        <form method="post" th:action="@{/login}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="form-label fw-semibold small">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-person-fill text-muted"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario"
                           autocomplete="username" autofocus required/>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="••••••••"
                           autocomplete="current-password" required/>
                </div>
            </div>

            <button type="submit" class="btn btn-login btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
        </form>

        <!-- Botón instalar PWA — solo visible si el navegador lo soporta -->
        <div id="installContainer" class="mt-3" style="display:none;">
            <hr class="my-3"/>
            <button id="btnInstall" class="btn btn-install text-white w-100 py-2">
                <i class="bi bi-phone-fill me-2"></i>Instalar App en este dispositivo
            </button>
            <p class="text-muted text-center small mt-2 mb-0">
                Accede rápidamente desde la pantalla de inicio
            </p>
        </div>
        <!-- Instrucciones para iOS (Safari no soporta el evento automático) -->
        <div id="iosInstall" class="mt-3" style="display:none;">
            <hr class="my-3"/>
            <p class="text-center small text-muted mb-1">
                <i class="bi bi-apple me-1"></i><strong>Instalar en iPhone/iPad:</strong>
            </p>
            <p class="text-center small text-muted mb-0">
                Toca <i class="bi bi-box-arrow-up"></i> Compartir → "Agregar a pantalla de inicio"
            </p>
        </div>
    </div>

    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

        // Detectar iOS
        const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        if (isIos && !isInStandaloneMode) {
            document.getElementById('iosInstall').style.display = 'block';
        }

        // Capturar el evento de instalación en Android/Chrome
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installContainer').style.display = 'block';
        });

        document.getElementById('btnInstall').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            if (outcome === 'accepted') {
                document.getElementById('installContainer').style.display = 'none';
            }
        });

        // Ocultar si ya está instalada
        window.addEventListener('appinstalled', () => {
            document.getElementById('installContainer').style.display = 'none';
        });
    </script>
</body>
</html>
