# 1. Configuración de Conexión (Usa las variables de Render si existen)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.rhfmkfetcstneqdhhegj.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.rhfmkfetcstneqdhhegj}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Marito199723gc}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de JPA/Hibernate (ESTO ES LO QUE SOLUCIONA TU ERROR)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. HikariCP (Optimizado para Supabase Free Tier)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=30000

# 4. Servidor y Vistas
server.port=${PORT:8080}
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# 5. Logs para ver qué pasa si falla
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE