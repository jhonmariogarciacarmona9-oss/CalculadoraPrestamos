# 1. Configuración de Conexión (Usa las variables de entorno si existen, si no usa H2 en memoria para desarrollo)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# 2. Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 console (solo activa en desarrollo sin base de datos externa)
spring.h2.console.enabled=true

# 3. HikariCP (Optimizado para Supabase Free Tier)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=30000

# 4. Servidor y Vistas
server.port=${PORT:8080}
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# 5. Logs para ver qué pasa si falla
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE