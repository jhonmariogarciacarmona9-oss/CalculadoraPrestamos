# 1. Configuración de Conexión — PostgreSQL
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Configuración de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 2b. Inicialización SQL (schema.sql + data.sql) — ejecutar siempre
spring.sql.init.mode=always

# 3. HikariCP (Optimizado para Supabase Free Tier)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=30000

# 4. Servidor y Vistas
server.port=${PORT:8080}
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# 5. Logs para ver qué pasa si falla
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE